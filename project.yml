name: IntervalAlarm
options:
  bundleIdPrefix: com.intervalalarm
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: 1
    GENERATE_INFOPLIST_FILE: false
targets:
  IntervalAlarm:
    type: application
    platform: iOS
    sources:
      - path: IntervalAlarm
        excludes:
          - Resources/Sounds/.gitkeep
          - Resources/Sounds/README.md
    resources:
      - path: IntervalAlarm/Resources/Sounds
        excludes:
          - .gitkeep
          - README.md
      - path: IntervalAlarm/Resources/Assets.xcassets
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      base:
        INFOPLIST_FILE: IntervalAlarm/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.intervalalarm.app
        DEVELOPMENT_TEAM: ""
  IntervalAlarmTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: IntervalAlarmTests
    dependencies:
      - target: IntervalAlarm
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
schemes:
  IntervalAlarm:
    build:
      targets:
        IntervalAlarm: all
        IntervalAlarmTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - IntervalAlarmTests
