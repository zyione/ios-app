name: Build iOS App

on:
  push:
    branches: [master, main]
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build & Package IPA
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use the latest Xcode 16.x available on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode.app 2>/dev/null)
          fi
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Install dependencies
        run: brew install xcodegen sox

      - name: Generate sound assets
        run: |
          chmod +x scripts/generate-sounds.sh
          ./scripts/generate-sounds.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List schemes (debug)
        run: xcodebuild -project IntervalAlarm.xcodeproj -list

      - name: Build app (unsigned for AltStore)
        run: |
          xcodebuild build \
            -project IntervalAlarm.xcodeproj \
            -scheme IntervalAlarm \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          APP_PATH=$(find build -name "IntervalAlarm.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r IntervalAlarm.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: IntervalAlarm-ipa
          path: IntervalAlarm.ipa
          retention-days: 90

  test:
    name: Run Unit Tests
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode.app 2>/dev/null)
          fi
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Install dependencies
        run: brew install xcodegen sox

      - name: Generate sound assets
        run: |
          chmod +x scripts/generate-sounds.sh
          ./scripts/generate-sounds.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Find available simulator
        id: simulator
        run: |
          # List available simulators and pick a recent iPhone
          xcrun simctl list devices available | grep iPhone
          DEST=$(xcrun simctl list devices available | grep "iPhone" | head -1 | sed 's/^[[:space:]]*//' | cut -d'(' -f1 | sed 's/[[:space:]]*$//')
          echo "Using simulator: $DEST"
          echo "name=$DEST" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: |
          xcodebuild test \
            -project IntervalAlarm.xcodeproj \
            -scheme IntervalAlarm \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.name }},OS=latest" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
