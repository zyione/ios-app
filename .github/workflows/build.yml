name: Build iOS App

on:
  push:
    branches: [master, main]
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build & Package IPA
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install xcodegen sox

      - name: Generate sound assets
        run: |
          chmod +x scripts/generate-sounds.sh
          ./scripts/generate-sounds.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (unsigned for AltStore)
        run: |
          xcodebuild build \
            -project IntervalAlarm.xcodeproj \
            -scheme IntervalAlarm \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/IntervalAlarm.app Payload/
          zip -r IntervalAlarm.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: IntervalAlarm-ipa
          path: IntervalAlarm.ipa
          retention-days: 90

  test:
    name: Run Unit Tests
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install xcodegen sox

      - name: Generate sound assets
        run: |
          chmod +x scripts/generate-sounds.sh
          ./scripts/generate-sounds.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        run: |
          xcodebuild test \
            -project IntervalAlarm.xcodeproj \
            -scheme IntervalAlarmTests \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug
